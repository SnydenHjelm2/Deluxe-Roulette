<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deluxe Roulette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Deluxe Roulette</h1>
    <p id="rolled">...</p>
    <p id="status">...</p>
    <div id="board">
        <div class="green">0</div>
        <div id="numbers">

        </div>
    </div>
    <button id="green">Green (0)</button>
    <div id="regular-buttons">
        <button id="low">1to18</button>
        <button id="even">Even</button>
        <button id="red">Red</button>
        <button id="black">Black</button>
        <button id="odd">Odd</button>
        <button id="high">19to36</button>
    </div>
    <div id="extra-buttons">
        <button id="first">1st12</button>
        <button id="second">2nd12</button>
        <button id="third">3rd12</button>
    </div>
    <div id="bets">
        <button id="bet">Bet</button>
        <button id="reset">Reset all bets</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
